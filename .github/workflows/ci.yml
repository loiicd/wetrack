name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint
    runs-on: ubuntu-latest
    env:
      # Needed for prisma generate which reads DATABASE_URL during postinstall
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/wetrack_ci

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      # Needed for prisma generate which reads DATABASE_URL during postinstall
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/wetrack_ci

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: cd apps/dashboard && bun run test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/dashboard/coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, tests]

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /signIn
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /signUp
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

  sdk-build:
    name: SDK Build (wetrack-dashboard)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ../wetrack-dashboard

    steps:
      - uses: actions/checkout@v4
        with:
          path: wetrack

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/wetrack-dashboard
          path: wetrack-dashboard

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: wetrack-dashboard
        run: bun install

      - name: Build SDK
        working-directory: wetrack-dashboard
        run: bun run build
