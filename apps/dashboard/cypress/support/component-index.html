<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>WeTrack – Cypress Component Tests</title>
  <style>
    :root {
      --background: oklch(1 0 0);
      --foreground: oklch(0.145 0 0);
      --card: oklch(1 0 0);
      --card-foreground: oklch(0.145 0 0);
      --popover: oklch(1 0 0);
      --popover-foreground: oklch(0.145 0 0);
      --primary: oklch(0.555 0.163 48.998);
      --primary-foreground: oklch(0.987 0.022 95.277);
      --secondary: oklch(0.967 0.001 286.375);
      --secondary-foreground: oklch(0.21 0.006 285.885);
      --muted: oklch(0.97 0 0);
      --muted-foreground: oklch(0.556 0 0);
      --accent: oklch(0.555 0.163 48.998);
      --accent-foreground: oklch(0.987 0.022 95.277);
      --destructive: oklch(0.58 0.22 27);
      --border: oklch(0.922 0 0);
      --input: oklch(0.922 0 0);
      --ring: oklch(0.708 0 0);
      --chart-1: oklch(0.879 0.169 91.605);
      --chart-2: oklch(0.769 0.188 70.08);
      --chart-3: oklch(0.666 0.179 58.318);
      --chart-4: oklch(0.555 0.163 48.998);
      --chart-5: oklch(0.473 0.137 46.201);
      --radius: 0.625rem;
      --sidebar: oklch(0.985 0 0);
      --sidebar-foreground: oklch(0.145 0 0);
      --sidebar-primary: oklch(0.555 0.163 48.998);
      --sidebar-primary-foreground: oklch(0.987 0.022 95.277);
      --sidebar-accent: oklch(0.97 0 0);
      --sidebar-accent-foreground: oklch(0.205 0 0);
      --sidebar-border: oklch(0.922 0 0);
      --sidebar-ring: oklch(0.708 0 0);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: var(--background);
      color: var(--foreground);
    }
  </style>
</head>

<body>
  <div data-cy-root></div>
</body>

</html>
